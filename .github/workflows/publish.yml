name: Publish

on:
  release:
    types: [published]

jobs:
  push:
    name: Publish to Rubygems
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
          ruby-version: 4

      - uses: rubygems/release-gem@v1
